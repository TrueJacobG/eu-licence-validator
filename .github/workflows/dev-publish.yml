name: Dev packages

# On every push to main: build the Wasm, run all tests, then publish
# pre-release ("dev") packages so other developers can depend on the
# bleeding-edge build. Each publish job is best-effort and only runs once the
# matching binding directory exists (so this stays green before Phase 3).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: dev-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: core/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@truejacobg"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install TinyGo
        run: curl -sSL https://tinygo.org/get | bash

      - name: Build and test
        run: make build-wasm && make test-all

      - name: Upload core.wasm
        uses: actions/upload-artifact@v4
        with:
          name: core-wasm
          path: |
            core/core.wasm
            bindings/*/wasm/core.wasm
            bindings/java/src/main/resources/core.wasm
          if-no-files-found: error

  publish-node:
    name: Publish npm (dev)
    needs: build
    runs-on: ubuntu-latest
    if: hashFiles('bindings/node/package.json') != ''
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@truejacobg"
      - name: Install TinyGo
        run: curl -sSL https://tinygo.org/get | bash
      - name: Build Wasm
        run: make build-wasm
      - name: Install deps
        run: npm ci
        working-directory: bindings/node
      - name: Set dev version
        run: npm version 0.0.0-dev.${{ github.run_number }} --no-git-tag-version
        working-directory: bindings/node
      - name: Publish to GitHub Packages (dev tag)
        run: npm publish --tag dev
        working-directory: bindings/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-python:
    name: Publish Python (TestPyPI, dev)
    needs: build
    runs-on: ubuntu-latest
    if: hashFiles('bindings/python/pyproject.toml') != ''
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install TinyGo
        run: curl -sSL https://tinygo.org/get | bash
      - name: Build Wasm
        run: make build-wasm
      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build
        working-directory: bindings/python
      - name: Publish to TestPyPI (dev)
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --repository testpypi --disable-progress-bar dist/*
        working-directory: bindings/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_TOKEN }}

  publish-ruby:
    name: Publish Ruby gem (dev)
    needs: build
    runs-on: ubuntu-latest
    if: hashFiles('bindings/ruby/*.gemspec') != ''
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Install TinyGo
        run: curl -sSL https://tinygo.org/get | bash
      - name: Build Wasm
        run: make build-wasm
      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p $HOME/.gem
          printf -- "---\n:github: Bearer %s\n" "${{ secrets.GITHUB_TOKEN }}" > $HOME/.gem/credentials
          chmod 0600 $HOME/.gem/credentials
      - name: Build gem
        run: gem build *.gemspec
        working-directory: bindings/ruby
      - name: Publish to GitHub Packages (dev)
        run: |
          gem push --key github --host https://rubygems.pkg.github.com/TrueJacobG *.gem
        working-directory: bindings/ruby

  publish-java:
    name: Publish Maven (dev)
    needs: build
    runs-on: ubuntu-latest
    if: hashFiles('bindings/java/pom.xml') != ''
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: github
          server-username: GITHUB_USERNAME
          server-password: GITHUB_TOKEN
      - name: Install TinyGo
        run: curl -sSL https://tinygo.org/get | bash
      - name: Build Wasm
        run: make build-wasm
      - name: Publish to GitHub Packages (dev)
        run: mvn -B -DskipTests deploy
        working-directory: bindings/java
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
