name: Release

# Triggered by version tags (v1.0.0, v1.0.0-rc.1, ...). Builds the Wasm,
# runs all tests, then publishes the stable packages to the public
# registries. Auth is provided via repository secrets.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: core/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install TinyGo
        run: |
          TINYGO_VERSION=0.41.1
          curl -L -o /tmp/tinygo.tar.gz \
            https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo${TINYGO_VERSION}.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf /tmp/tinygo.tar.gz
          echo "/usr/local/tinygo/bin" >> $GITHUB_PATH

      - name: Build and test
        run: make build-wasm && make test-all

      - name: Upload core.wasm
        uses: actions/upload-artifact@v4
        with:
          name: core-wasm
          path: |
            core/core.wasm
            bindings/*/wasm/core.wasm
            bindings/java/src/main/resources/core.wasm
          if-no-files-found: error

  publish-node:
    name: Publish npm
    needs: build
    runs-on: ubuntu-latest
    if: hashFiles('bindings/node/package.json') != ''
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - name: Install TinyGo
        run: |
          TINYGO_VERSION=0.41.1
          curl -L -o /tmp/tinygo.tar.gz \
            https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo${TINYGO_VERSION}.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf /tmp/tinygo.tar.gz
          echo "/usr/local/tinygo/bin" >> $GITHUB_PATH
      - name: Build Wasm
        run: make build-wasm
      - name: Install deps
        run: npm ci
        working-directory: bindings/node
      - name: Publish to npm
        run: npm publish
        working-directory: bindings/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    name: Publish PyPI
    needs: build
    runs-on: ubuntu-latest
    if: hashFiles('bindings/python/pyproject.toml') != ''
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install TinyGo
        run: |
          TINYGO_VERSION=0.41.1
          curl -L -o /tmp/tinygo.tar.gz \
            https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo${TINYGO_VERSION}.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf /tmp/tinygo.tar.gz
          echo "/usr/local/tinygo/bin" >> $GITHUB_PATH
      - name: Build Wasm
        run: make build-wasm
      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build
        working-directory: bindings/python
      - name: Publish to PyPI
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --disable-progress-bar dist/*
        working-directory: bindings/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-ruby:
    name: Publish RubyGems
    needs: build
    runs-on: ubuntu-latest
    if: hashFiles('bindings/ruby/*.gemspec') != ''
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Install TinyGo
        run: |
          TINYGO_VERSION=0.41.1
          curl -L -o /tmp/tinygo.tar.gz \
            https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo${TINYGO_VERSION}.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf /tmp/tinygo.tar.gz
          echo "/usr/local/tinygo/bin" >> $GITHUB_PATH
      - name: Build Wasm
        run: make build-wasm
      - name: Publish to RubyGems
        run: |
          mkdir -p $HOME/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "${{ secrets.RUBYGEMS_API_KEY }}" > $HOME/.gem/credentials
          chmod 0600 $HOME/.gem/credentials
          gem build *.gemspec
          gem push *.gem
        working-directory: bindings/ruby

  publish-java:
    name: Publish Maven Central
    needs: build
    runs-on: ubuntu-latest
    if: hashFiles('bindings/java/pom.xml') != ''
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Install TinyGo
        run: |
          TINYGO_VERSION=0.41.1
          curl -L -o /tmp/tinygo.tar.gz \
            https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo${TINYGO_VERSION}.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf /tmp/tinygo.tar.gz
          echo "/usr/local/tinygo/bin" >> $GITHUB_PATH
      - name: Build Wasm
        run: make build-wasm
      - name: Publish to Maven Central
        run: mvn -B -DskipTests -Ppublish deploy
        working-directory: bindings/java
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: core/core.wasm
